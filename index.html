<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动森儿童图鉴 (A4 打印版)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="a4-page">
    
    <div class="header">
      <h1><span>🍃</span> 我的动森图鉴 <span>🍃</span></h1>
      
    </div>

    <div class="content">
      
      <!-- 昆虫区 -->
      <div class="section bugs">
        <div class="section-title">🦋 昆虫研究所</div>
        <div class="item-grid">
          <div class="item"><div class="item-icon">🦋</div><div class="item-name">白粉蝶</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐞</div><div class="item-name">瓢虫</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐝</div><div class="item-name">蜜蜂</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐌</div><div class="item-name">蜗牛</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦗</div><div class="item-name">蟋蟀</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐜</div><div class="item-name">蚂蚁</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🕷️</div><div class="item-name">狼蛛</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦂</div><div class="item-name">蝎子</div><div class="item-check"></div></div>
        </div>
      </div>

      <!-- 鱼类区 -->
      <div class="section fishes">
        <div class="section-title">🐟 水族馆</div>
        <div class="item-grid">
          <div class="item"><div class="item-icon">🐟</div><div class="item-name">竹荚鱼</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐠</div><div class="item-name">小丑鱼</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐡</div><div class="item-name">河豚</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦈</div><div class="item-name">大白鲨</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦑</div><div class="item-name">鱿鱼</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐙</div><div class="item-name">章鱼</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦐</div><div class="item-name">甜虾</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦞</div><div class="item-name">龙虾</div><div class="item-check"></div></div>
        </div>
      </div>

      <!-- 化石区 -->
      <div class="section fossils">
        <div class="section-title">🦴 远古化石</div>
        <div class="item-grid">
          <div class="item"><div class="item-icon">🦖</div><div class="item-name">霸王龙</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦕</div><div class="item-name">腕龙</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦣</div><div class="item-name">猛犸象</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🦤</div><div class="item-name">渡渡鸟</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐚</div><div class="item-name">菊石</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🐾</div><div class="item-name">恐龙脚印</div><div class="item-check"></div></div>
        </div>
      </div>

      <!-- 水果与植物区 -->
      <div class="section fruits">
        <div class="section-title">🍎 特产水果</div>
        <div class="item-grid">
          <div class="item"><div class="item-icon">🍎</div><div class="item-name">苹果</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🍊</div><div class="item-name">橘子</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🍒</div><div class="item-name">樱桃</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🍑</div><div class="item-name">桃子</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🍐</div><div class="item-name">梨子</div><div class="item-check"></div></div>
          <div class="item"><div class="item-icon">🥥</div><div class="item-name">椰子</div><div class="item-check"></div></div>
        </div>
      </div>

    </div>

    <div class="footer">
      带着这本图鉴，去岛上探险吧！ —— 动物森友会专属收集册
    </div>

  </div>

</body>
</html>
